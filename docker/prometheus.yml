global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: envit5_api
    static_configs:
      - targets: ['api:8080']
    metrics_path: /metrics

  - job_name: envit5_worker
    static_configs:
      - targets: ['worker:9091']
    metrics_path: /metrics

  - job_name: triton
    static_configs:
      - targets: ['triton:8002']
    metrics_path: /metrics

  - job_name: traefik
    static_configs:
      - targets: ['traefik:8899']
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node_exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: dcgm_exporter
    static_configs:
      - targets: ['dcgm-exporter:9400']
