name: envit5

services:
  triton:
    build:
      context: .
      dockerfile: docker/triton.Dockerfile
      args:
        TRITON_VERSION: ${TRITON_VERSION:-24.12-py3}
    image: envit5/triton:local
    command: >
      tritonserver
      --model-repository=/models
      --model-control-mode=none
    working_dir: /workspace
    environment:
      # Used by scripts/export_models.py when run inside this container (`make export`).
      ENVIT5_HF_MODEL_EN_VI: ${ENVIT5_HF_MODEL_EN_VI:-Helsinki-NLP/opus-mt-en-vi}
      ENVIT5_HF_MODEL_VI_EN: ${ENVIT5_HF_MODEL_VI_EN:-Helsinki-NLP/opus-mt-vi-en}
    volumes:
      - ./model_repository:/models
      - ./scripts:/workspace/scripts
      - hf-cache:/root/.cache/huggingface
    ports:
      - "8000:8000"   # HTTP / REST inference
      - "8001:8001"   # gRPC inference
      - "8002:8002"   # Prometheus metrics
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8g
        reservations:
          cpus: "1.0"
          memory: 2g
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: "1gb"
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/v2/health/ready')
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          cpus: "0.1"
          memory: 64m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
        reservations:
          cpus: "0.1"
          memory: 256m
    depends_on:
      - triton

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          cpus: "0.1"
          memory: 128m
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.1.0
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
        reservations:
          cpus: "0.1"
          memory: 128m

  promtail:
    image: grafana/promtail:3.1.0
    volumes:
      - ./docker/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m
        reservations:
          cpus: "0.05"
          memory: 64m
    depends_on:
      - loki

volumes:
  hf-cache:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:
